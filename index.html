<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2196F3">
    <meta name="description" content="A simple to-do list PWA">
    <title>To-Do PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%232196F3' width='192' height='192'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='120' fill='white' font-family='Arial'>✓</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%232196F3' width='192' height='192'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='120' fill='white' font-family='Arial'>✓</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- User Selection Modal -->
    <div id="userModal" class="user-modal">
        <div class="user-modal-content">
            <h2 id="userModalTitle">Select or Create Profile</h2>
            <div id="userList" class="user-list"></div>
            <div style="border-top: 1px solid #e0e0e0; padding-top: 16px; margin-top: 16px;">
                <p style="font-size: 12px; color: #757575; margin-bottom: 8px;">Create New Profile:</p>
                <div class="user-input-section">
                    <input 
                        type="text" 
                        id="newUsername" 
                        placeholder="Enter new username" 
                        autocomplete="off"
                    >
                    <button id="createUserBtn" class="btn-create-user">Create</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="header-top">
                <div class="header-left">
                    <h1 id="appTitle">My To-Do List</h1>
                    <p class="user-display" id="userDisplay"></p>
                </div>
                <div class="header-right">
                    <div class="language-toggle">
                        <button class="lang-btn active" data-lang="en">🇬🇧 EN</button>
                        <button class="lang-btn" data-lang="vi">🇻🇳 VI</button>
                        <button class="lang-btn" data-lang="lg">🇺🇬 LG</button>
                    </div>
                    <button id="switchUserBtn" class="btn-switch-user">Switch User</button>
                </div>
            </div>
            <p class="subtitle" id="subtitle">Stay organized and productive</p>
        </header>

        <div class="input-section">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="What needs to be done?" 
                autocomplete="off"
            >
            
            <div class="form-row">
                <input 
                    type="date" 
                    id="dateInput"
                >
                
                <select id="priorityInput">
                    <option value="low" data-label="low">Low</option>
                    <option value="medium" data-label="medium" selected>Medium</option>
                    <option value="high" data-label="high">High</option>
                </select>

                <button id="addBtn" class="btn-add">Add Task</button>
            </div>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
            <button class="filter-btn" data-filter="high">High Priority</button>
        </div>

        <div id="taskList" class="task-list">
            <p class="empty-state">No tasks yet. Add one to get started!</p>
        </div>

        <footer class="stats">
            <span id="taskCount">0 tasks</span>
            <button id="clearBtn" class="btn-clear">Clear Completed</button>
        </footer>
    </div>

    <script src="i18n.js"></script>
    <script src="app.js"></script>
</body>
</html>
